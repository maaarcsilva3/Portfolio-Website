<!DOCTYPE html>
<html>
    <head>
        <title> Works</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">        <link rel="stylesheet" href="index_style.css">
    </head>

    <body>
        <div class="container mt-3  header" >
            <div class="row d-flex">

                <div class="col p-4 d-flex "> 
                    <img class="logo " src="images\logo-no-background.png" alt="My picture">
                    <h4 class="name">Marc Silva</h4>
                </div>

                <div class="col p-4 buttons">
                    <button class="btn btn-primary contact" onclick="window.location.href='index.html'" type="submit">Home</button>
                    <button class="btn btn-primary view" type="submit">View Work</button>
                </div>
            </div>
            
        </div>


        <div id="carousel_container" class=" carousel slide " data-bs-ride="carousel">

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carousel_container" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#carousel_container" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carousel_container" data-bs-slide-to="2"></button>
            </div>

            <div class="carousel-inner  " >
                <div class="carousel-item  active">
                    <div class="d-flex justify-content-center">
                        <img id="img_1" src="work-images\first html page.jpg" alt="first html page image"  >
                    </div>    
                    <div class="carousel-caption">
                        <h3>Our First HTML Website</h3>
                    </div> 
                </div>
                <div  class="carousel-item ">
                    <div class="d-flex justify-content-center">
                        <img id="img_2" src="work-images\world wide web.jpg" alt="www image"  >
                    </div> 
                    <div class="carousel-caption">
                        <h3>Remaking the first World Wide Web</h3>
                    </div>    
                </div>
                <div  class="carousel-item">
                    <div class="d-flex justify-content-center">
                        <img id="img_3" src="work-images\bootstrap grid system.jpg" alt="bootstrap grid system"  >
                    </div>  
                    <div class="carousel-caption">
                        <h3 id="description_carousel">Our First Bootsrap Activity</h3>
                    </div>   
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carousel_container" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#carousel_container" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
              </button>

        </div>



















        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    </body>
</html>
